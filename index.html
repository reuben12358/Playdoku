<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdoku - Daily Sports Trivia Grid</title>
  <meta name="description" content="Playdoku - A daily sports trivia grid game for Football, NBA & NFL. Guess the player that fits both the row and column categories!">
  <meta property="og:title" content="Playdoku - Daily Sports Trivia Grid">
  <meta property="og:description" content="Can you guess the player for each cell? Football, NBA & NFL puzzles every day!">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9917;</text></svg>">
  <link rel="stylesheet" href="css/styles.css?v=10">
</head>
<body>

  <!-- Landing Screen -->
  <div id="landing" class="landing">
    <div class="landing-bg"></div>
    <div class="landing-content">
      <h1 class="landing-title">Playdoku</h1>
      <p class="landing-subtitle">Daily Sports Trivia Grid</p>
      <div class="landing-cards">
        <button class="landing-card" data-sport="football" style="--card-delay: 0s; --card-color: #1B5E20;">
          <div class="landing-card-icon">&#9917;</div>
          <div class="landing-card-name">Football</div>
          <div class="landing-card-desc">Clubs, countries, leagues & more</div>
        </button>
        <button class="landing-card" data-sport="basketball" style="--card-delay: 0.1s; --card-color: #C35817;">
          <div class="landing-card-icon">&#127936;</div>
          <div class="landing-card-name">Basketball</div>
          <div class="landing-card-desc">NBA teams, positions & awards</div>
        </button>
        <button class="landing-card" data-sport="nfl" style="--card-delay: 0.2s; --card-color: #013369;">
          <div class="landing-card-icon">&#127944;</div>
          <div class="landing-card-name">NFL</div>
          <div class="landing-card-desc">All 32 teams, positions & awards</div>
        </button>
        <button class="landing-card" data-sport="cricket" style="--card-delay: 0.3s; --card-color: #1565C0;">
          <div class="landing-card-icon">&#127951;</div>
          <div class="landing-card-name">Cricket</div>
          <div class="landing-card-desc">IPL teams, countries & positions</div>
        </button>
      </div>
      <p class="landing-hint">Select a sport to start today's puzzle</p>
    </div>
  </div>

  <!-- Game Screen (hidden initially) -->
  <div id="game-screen" class="game-screen hidden">
    <header>
      <div class="header-left">
        <button id="home-btn" class="icon-btn" aria-label="Back to home">&#8592;</button>
      </div>
      <div class="header-center">
        <h1>Playdoku</h1>
        <div class="sport-toggle">
          <button class="sport-btn active" data-sport="football" aria-label="Football">&#9917;</button>
          <button class="sport-btn" data-sport="basketball" aria-label="Basketball">&#127936;</button>
          <button class="sport-btn" data-sport="nfl" aria-label="NFL">&#127944;</button>
          <button class="sport-btn" data-sport="cricket" aria-label="Cricket">&#127951;</button>
        </div>
      </div>
      <div class="header-right">
        <button id="theme-btn" class="icon-btn" aria-label="Toggle dark mode">&#9790;</button>
        <button id="info-btn" class="icon-btn" aria-label="How to play">?</button>
        <button id="stats-btn" class="icon-btn" aria-label="Stats">&#128202;</button>
      </div>
    </header>

    <main>
      <div class="puzzle-header">
        <div id="puzzle-number" class="puzzle-number"></div>
        <button id="refresh-btn" class="refresh-btn" aria-label="New puzzle">&#8635;</button>
      </div>
      <div id="grid-container" class="grid-container">
      </div>
      <div id="game-actions" class="game-actions">
        <button id="share-btn" class="btn btn-primary" style="display:none;">Share Results</button>
      </div>
    </main>

    <footer>
      <p>A new puzzle every day &bull; <a href="https://github.com/reuben12358/Playdoku" target="_blank">GitHub</a></p>
    </footer>
  </div>

  <!-- Search Modal -->
  <div id="search-modal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content search-modal-content">
      <div class="modal-header">
        <span id="search-criteria" class="search-criteria"></span>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <input type="text" id="search-input" class="search-input" placeholder="Type a player name..." autocomplete="off" autocapitalize="off" spellcheck="false">
      <ul id="search-results" class="search-results"></ul>
    </div>
  </div>

  <!-- Info Modal -->
  <div id="info-modal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content info-modal-content">
      <div class="modal-header">
        <h2 id="info-title">How to Play</h2>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="info-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div id="stats-modal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Statistics</h2>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="stats-grid">
          <div class="stat">
            <div id="stat-played" class="stat-value">0</div>
            <div class="stat-label">Played</div>
          </div>
          <div class="stat">
            <div id="stat-correct" class="stat-value">0</div>
            <div class="stat-label">Correct</div>
          </div>
          <div class="stat">
            <div id="stat-streak" class="stat-value">0</div>
            <div class="stat-label">Streak</div>
          </div>
          <div class="stat">
            <div id="stat-best" class="stat-value">0</div>
            <div class="stat-label">Best</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="gameover-modal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="gameover-title">Game Over!</h2>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="gameover-message"></p>
        <div id="gameover-grid" class="gameover-grid"></div>
        <div class="gameover-actions">
          <button id="gameover-share-btn" class="btn btn-primary">Share Results</button>
          <button id="gameover-play-again" class="btn btn-secondary">Play Again?</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="js/app.js?v=10"></script>
</body>
</html>
